name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  product:
    uses: ./.github/workflows/reusable-image.yml
    with:
      service: product-service
    secrets: inherit

  deploy-prod:
    needs: product
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://example.com

    steps:
      - name: Deploy to production
        run: echo "Deploying to prod..."